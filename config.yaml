# FreeWhisper settings
hotkey: ctrl+shift+space        # tap once to start recording (auto-stops on silence)
                                # (ctrl+alt+space is taken by Claude Desktop)
command_hotkey: ctrl+shift+c    # speak an instruction about the selected text (⚡)
                                # (note: also opens DevTools inspect in browsers)
language_toggle_hotkey: ctrl+alt+l
language: auto                  # auto | he | en — auto detects per dictation
command_language: he            # ⚡ commands are short — auto-detect hallucinates on them,
                                # so they're transcribed in this language when language=auto

# --- Jarvis (voice assistant, `python -m jarvis`) ---
talk_hotkey: ctrl+shift+j       # press or click the core to talk to Jarvis
voice_he: he-IL-AvriNeural      # edge-tts Hebrew voice (AvriNeural=male, HilaNeural=female)
voice_en: en-GB-RyanNeural      # edge-tts English voice (British, Jarvis-ish)
voice_rate: "+8%"
anthropic_key: ""               # leave blank — put the real key in secret.yaml (gitignored)
claude_model: claude-sonnet-5   # cloud brain w/ tools (used when a key is present)
chat_model: gemma3:12b          # local Ollama brain (used when no key)

silence_seconds: 2              # stop recording after this much quiet
silence_threshold: 0.008        # mic level counted as "talking" (see --test-mic)
max_record_s: 120               # hard cap per dictation

models:
  # Hebrew fine-tune (ivrit.ai) in CTranslate2 format, English = stock large-v3-turbo
  he: ivrit-ai/whisper-large-v3-turbo-ct2
  en: deepdml/faster-whisper-large-v3-turbo-ct2

device: auto                    # auto | cuda | cpu
compute_type: default           # default | float16 | int8_float16 | int8
beam_size: 5

llm:
  enabled: true
  url: http://127.0.0.1:11434  # not "localhost" — Windows tries IPv6 first, +2s per request
  model: gemma3:12b             # best Hebrew quality; qwen2.5:7b is faster but garbles words
  timeout_s: 60                 # first call loads the model into VRAM and can be slow

# Personal dictionary: names/terms you use often. Biases both the STT and the LLM.
dictionary: []
#  - לב התחביב
#  - Preact

paste_delay_ms: 150             # wait before/after Ctrl+V so the target app keeps up
restore_clipboard: false        # false = the result stays in your clipboard (reliable);
                                # true = restore old clipboard after 1s (slow apps may
                                # paste the old content instead — the "echo" bug)
input_device: null              # mic index from `--check`; null = system default
overlay: true                   # floating always-on-top widget (record / HE-EN / quit)
live_typing: true               # stream the draft into the target field while you speak,
                                # then replace it with the clean version (don't move the
                                # cursor mid-dictation!)
